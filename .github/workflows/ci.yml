name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-gateway:
    name: Build Gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t gateway ./services/gateway

  build-google-mcp:
    name: Build Google MCP Sidecar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t google-mcp-sidecar ./services/google-mcp-sidecar

  build-telegram:
    name: Build Telegram Sidecar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t telegram-sidecar ./services/telegram-sidecar

  build-whatsapp:
    name: Build WhatsApp Sidecar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t whatsapp-sidecar ./services/whatsapp-sidecar

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build-gateway, build-google-mcp, build-telegram, build-whatsapp]
    steps:
      - uses: actions/checkout@v4
      - name: Build all images
        run: |
          docker build -t gateway ./services/gateway
          docker build -t google-mcp-sidecar ./services/google-mcp-sidecar
          docker build -t telegram-sidecar ./services/telegram-sidecar
          docker build -t whatsapp-sidecar ./services/whatsapp-sidecar
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: gateway
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
      - name: Scan google-mcp-sidecar
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: google-mcp-sidecar
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
      - name: Scan telegram-sidecar
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: telegram-sidecar
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
      - name: Scan whatsapp-sidecar
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: whatsapp-sidecar
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
